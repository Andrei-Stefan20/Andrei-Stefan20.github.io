name: Check links

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Build site with Jekyll
        run: bundle exec jekyll build --source ./ --destination ./_site --config config.yml
        env:
          JEKYLL_ENV: production
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude '^mailto:' --exclude '^#$' './_site/**/*.html'
