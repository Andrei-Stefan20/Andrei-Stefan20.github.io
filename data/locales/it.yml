about:
  - "Sono un Full-Stack Developer e studente magistrale in Intelligenza Artificiale all'Università di Bari."
  - "Il mio lavoro spazia tra ingegneria del software, machine learning e ricerca sull'IA. Mi interessano in particolare i modelli linguistici di grandi dimensioni, i knowledge graph e la costruzione di sistemi software affidabili."
  - "Qui trovi una selezione dei progetti a cui ho lavorato durante il mio percorso accademico e professionale."

about_page:
  title: "Chi sono"
  intro: "Costruisco software e studio intelligenza artificiale, con un'attenzione particolare a sistemi pratici che siano chiari, affidabili e utili."
  sections:
    - title: "Percorso"
      paragraphs:
        - "Sono un Full-Stack Developer e studente magistrale in Intelligenza Artificiale all'Università di Bari. Il mio percorso accademico unisce le basi dell'informatica allo studio dei moderni sistemi di IA."
        - "Mi piace muovermi tra teoria e implementazione: capire un problema a fondo, progettare una soluzione chiara e trasformarla in software utilizzabile."
    - title: "Di cosa mi occupo"
      paragraphs:
        - "I miei interessi includono ingegneria del software, machine learning, modelli linguistici di grandi dimensioni e knowledge graph. Mi interessa in particolare come queste tecnologie possano diventare prodotti affidabili e comprensibili."
        - "Attraverso progetti accademici e personali lavoro con servizi backend, applicazioni web, pipeline di dati e funzionalità basate sull'IA."
    - title: "Come affronto i progetti"
      paragraphs:
        - "Valorizzo interfacce semplici, codice manutenibile e risultati misurabili. Preferisco partire dal problema reale dell'utente o della ricerca, scegliendo poi la soluzione tecnica più piccola che lo risolve bene."

