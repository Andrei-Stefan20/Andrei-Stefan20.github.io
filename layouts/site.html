{% assign current_lang = page.lang | default: site.languages.default %}
<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="{{ site.appearance.accent_color }}">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        var storedBg = localStorage.getItem('bg-pattern');
        if (storedBg) document.documentElement.setAttribute('data-bg', storedBg);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <style>:root { --accent-base: {{ site.appearance.accent_color | default: '#00008b' }}; }</style>
  {% seo %}{% feed_meta %}
</head>
<body>
  {% include site-header.html %}
  <main class="page-content"><div class="wrapper">{{ content }}</div></main>
  {% include site-footer.html %}
  <script src="{{ '/js/theme.js' | relative_url }}" defer></script>
  <script src="{{ '/js/background.js' | relative_url }}" defer></script>
  <script src="{{ '/js/nav.js' | relative_url }}" defer></script>
</body>
</html>
