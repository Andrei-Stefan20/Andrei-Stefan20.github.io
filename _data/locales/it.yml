about:
  - "Sono uno sviluppatore full-stack e uno studente magistrale in Intelligenza Artificiale all'Università di Bari."
  - "Lavoro tra ingegneria del software, machine learning e ricerca sull'IA, con un interesse particolare per i modelli linguistici, i knowledge graph e i sistemi software affidabili."
  - "Qui raccolgo una selezione dei progetti e degli articoli nati dal mio percorso accademico, professionale e personale."

about_page:
  title: "Chi sono"
  intro: "Costruisco software e studio intelligenza artificiale, concentrandomi su sistemi pratici, chiari e affidabili."
  sections:
    - title: "Percorso"
      paragraphs:
        - "Sono uno sviluppatore full-stack e uno studente magistrale in Intelligenza Artificiale all'Università di Bari. Il mio percorso unisce solide basi informatiche allo studio dei sistemi di IA moderni."
        - "Mi piace passare dalla teoria all'implementazione: capire bene un problema, progettare una soluzione essenziale e trasformarla in software realmente utilizzabile."
    - title: "Di cosa mi occupo"
      paragraphs:
        - "I miei interessi includono ingegneria del software, machine learning, modelli linguistici di grandi dimensioni e knowledge graph. Mi interessa soprattutto capire come combinarli in prodotti affidabili e comprensibili."
        - "Nei progetti accademici e personali lavoro con servizi backend, applicazioni web, pipeline di dati e funzionalità basate sull'intelligenza artificiale."
    - title: "Come lavoro"
      paragraphs:
        - "Cerco interfacce semplici, codice manutenibile e risultati misurabili. Parto dal problema reale, poi scelgo la soluzione tecnica più piccola che riesca a risolverlo bene."

