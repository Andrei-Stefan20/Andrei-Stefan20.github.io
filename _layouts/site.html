<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="{{ site.appearance.accent_color }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <style>:root { --accent: {{ site.appearance.accent_color | default: '#00008b' }}; }</style>
  {% seo %}{% feed_meta %}
</head>
<body>
  {% include site-header.html %}
  <main class="page-content"><div class="wrapper">{{ content }}</div></main>
  {% include site-footer.html %}
</body>
</html>
